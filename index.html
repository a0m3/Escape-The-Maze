<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
    <script defer src="./javascript/app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap');
    </style>
</head>

<body>
    <div id="main-menu">
        <h1 id="game-title">Escape The Maze</h1>
        <button id="start-btn" onclick="startGame()">Start</button>
        <button id="setting-btn">Setting</button>
    </div>

    <div id="setting-menu">
        <button id="back-btn">← Back</button>
        <h2 id="setting">Setting</h2>
        <div id="darkmode-row">
        <h3>Dark Mode</h3>
        <label class="switch">
            <input type="checkbox">
            <span class="slider round"></span>
        </label>
    </div>
    </div>

    <div id="maze-container">
        
        <div id="player"></div>
        <div id="top-menu">
            
            <h1 id="level-title">Level 1</h1>
            <h1 id="timer">Timer: </h1>
        </div>
        <div style="display: flex; justify-content: center; position:relative">
        <div id="maze"></div>

        </div>


        <div id="win-popup">
            <h2>You Win!</h2>
            <button id="nextLevelBtn">Next Level</button>
            <button id="tryAgainBtn">Try Again</button>
            <button id="exitBtn">Exit</button>
            
        </div>

        <div id="timeout">
            <h2>Time out! Try Again</h2>
            <button id="tryAgainBtn2">Try Again</button>
            <button id="exitBtn2">Exit</button>
        </div>
    </div>





</body>

</html>
